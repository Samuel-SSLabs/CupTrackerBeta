<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Painel Copa 2026</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="debug-log">Conectando...</div>

    <div class="tft-screen">

        <!-- CABEÇALHO -->
        <header class="header">
            <span class="header-title">COPA 2026</span>
            <div class="header-actions">
                <button id="btn-teste-audio" class="icon-btn" title="Testar Som">
                    <img src="assets/favicon.ico" alt="Testar Som">
                </button>
                <button id="btn-toggle-torneio" class="icon-btn highlight-btn" title="Ver Torneio">
                    <img src="assets/trophy-icon.png" alt="Torneio" class="btn-icon-img">
                </button>
            </div>
        </header>

        <!-- LAYOUT PRINCIPAL DESLIZANTE -->
        <div id="app-layout" class="layout-jogos">

            <!-- COLUNA ESQUERDA: painel de partidas -->
            <div class="painel-jogos">
                <div class="game-list" id="main-queue">
                    <div class="sem-jogos">Carregando...</div>
                </div>

                <div class="history-block">
                    <div class="history-title" id="history-title-label">Último Resultado</div>
                    <div id="history-content">
                        <div style="color:var(--text-muted);text-align:center;font-size:12px;">Aguardando dados...</div>
                    </div>
                </div>
            </div>

            <!-- COLUNA DIREITA: painel de torneio (oculto por padrão) -->
            <div class="painel-torneio">

                <!-- Chaveamento -->
                <div class="torneio-box torneio-box-bracket">
                    <div class="bracket-container">
                        <div class="bracket-side side-left" id="bracket-left"></div>
                        <div class="bracket-center">
                            <div class="final-box">
                                <span class="center-title">FINAL</span>
                                <img src="assets/trophy-icon.png" class="trophy-overlay" alt="Trophy">
                                <div class="match-slot final-slot"></div>
                            </div>
                            <div class="bronze-box">
                                <span class="center-title">3º LUGAR</span>
                                <div class="match-slot"></div>
                            </div>
                        </div>
                        <div class="bracket-side side-right" id="bracket-right"></div>
                    </div>
                </div>

                <!-- Carrossel de Grupos -->
                <div class="torneio-box">
                    <div class="grupos-carousel-container">
                        <div class="grupos-scroller" id="grupos-rodape"></div>
                    </div>
                </div>

            </div>
        </div>

        <!-- MODAL DE DETALHES -->
        <div id="modal-detalhes">
            <div class="modal-header">
                <button id="btn-voltar" onclick="fecharModal()" title="Voltar">←</button>
                <span class="modal-titulo">DETALHES</span>
            </div>
            <div class="modal-body" id="conteudo-estatisticas">
                <div class="modal-loading">
                    <div class="spinner"></div>
                    <span>Carregando...</span>
                </div>
            </div>
        </div>

    </div>

    <div class="powered-by">
        <span>Powered by</span>
        <div class="powered-by-logos">
            <img src="assets/sstudios-logo.png" alt="SStudios Logo">
            <img src="assets/logo-parceiro.png" alt="Logo Parceiro">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
