<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Copa 2026</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-room: #14161a;
            --screen-bg: #07090a;
            --bezel-light: #4b515c;
            --bezel-dark: #161819;
            --green-1: #0e8a4b;
            --green-2: #06472a;
            --amber: #ffab4d;
            --gol-glow: #3dffa0;
            --text-primary: #f4f6f2;
            --text-muted: #8d939c;
            --card-bg: #101214;
            --card-border: #262a30;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-room);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Outfit', sans-serif;
        }

        .tft-screen {
            width: 320px;
            height: 480px;
            border: 12px solid transparent;
            border-radius: 22px;
            background-image:
                linear-gradient(var(--screen-bg), var(--screen-bg)),
                linear-gradient(155deg, var(--bezel-light), var(--bezel-dark) 55%, #0a0b0c);
            background-origin: border-box;
            background-clip: content-box, border-box;
            box-shadow:
                0 25px 60px -12px rgba(0, 0, 0, 0.75),
                inset 0 0 30px rgba(0, 0, 0, 0.55);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .header {
            background: linear-gradient(135deg, var(--green-1), var(--green-2));
            color: #FFFFFF;
            height: 42px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1.5px;
            border-bottom: 2px solid rgba(255, 196, 0, 0.6);
            flex-shrink: 0;
            position: relative;
        }

        #btn-teste-audio {
            position: absolute;
            right: 10px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: background-color 0.2s, transform 0.2s;
        }

        #btn-teste-audio:hover {
            background-color: rgba(255, 255, 255, 0.18);
            transform: scale(1.12);
        }

        #btn-teste-audio:active {
            transform: scale(0.95);
        }

        #btn-teste-audio img {
            width: 20px;
            height: 20px;
            object-fit: contain;
            filter: invert(1);
        }

        .game-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 12px 10px;
            background-color: transparent;
        }

        .game-list::-webkit-scrollbar {
            width: 0px;
        }

        .history-block {
            background-color: #131517;
            border-top: 1px solid var(--card-border);
            padding: 10px;
            flex-shrink: 0;
        }

        .history-title {
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
            text-align: center;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        #history-content {
            color: var(--text-muted);
            font-size: 12px;
            text-align: center;
        }

        .match-block {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(160deg, #16181b, #0b0c0e);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 10px 6px;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .match-block.live {
            border-color: var(--amber);
            background: linear-gradient(160deg, #2a2010, #160f06);
            box-shadow: 0 0 14px -2px rgba(255, 171, 77, 0.35);
        }

        .match-block.gol-ativo {
            border-color: var(--gol-glow);
            position: relative;
            animation: brilhoBorda 2.2s ease-in-out infinite;
        }

        .match-block.gol-ativo::after {
            content: "";
            position: absolute;
            inset: -1px;
            border-radius: 10px;
            background: radial-gradient(circle at 50% 50%, rgba(61, 255, 160, 0.16), transparent 70%);
            pointer-events: none;
            animation: pulsarFundo 2.2s ease-in-out infinite;
        }

        .team-side {
            display: flex;
            align-items: center;
            width: 30%;
        }

        .team-side.right {
            justify-content: flex-end;
        }

        .team-logo {
            width: 24px;
            height: 24px;
            object-fit: contain;
            margin: 0 6px;
            filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.5));
        }

        .tla {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .center-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 40%;
        }

        .score-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-size: 22px;
            font-weight: 700;
        }

        .score-num {
            display: inline-block;
            min-width: 16px;
            text-align: center;
            font-variant-numeric: tabular-nums;
            transition: color 0.3s ease;
        }

        .score-sep {
            font-size: 12px;
            font-weight: 400;
            color: var(--text-muted);
        }

        .score-num.gol-marcado {
            animation: brilhoGol 2.2s ease-in-out infinite;
        }

        .status-time {
            font-size: 11px;
            font-weight: 400;
            margin-top: 5px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .live .status-time {
            color: var(--amber);
            font-weight: 600;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--amber);
            display: inline-block;
            animation: pulsarPonto 1.4s ease-in-out infinite;
        }

        #debug-log {
            position: absolute;
            top: 10px;
            left: 12px;
            color: #6fffa0;
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            z-index: 10;
            opacity: 0.85;
        }

        @keyframes pulsarPonto {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.35; transform: scale(0.75); }
        }

        @keyframes brilhoGol {
            0%, 100% {
                text-shadow: 0 0 4px rgba(61, 255, 160, 0.18);
            }
            50% {
                text-shadow: 0 0 10px rgba(61, 255, 160, 0.45), 0 0 18px rgba(61, 255, 160, 0.28);
            }
        }

        @keyframes brilhoBorda {
            0%, 100% { box-shadow: 0 0 4px rgba(61, 255, 160, 0.18); }
            50% { box-shadow: 0 0 10px rgba(61, 255, 160, 0.45); }
        }

        @keyframes pulsarFundo {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        @media (prefers-reduced-motion: reduce) {
            .match-block,
            .live-dot,
            .score-num.gol-marcado,
            .match-block.gol-ativo,
            .match-block.gol-ativo::after {
                animation: none !important;
            }
        }
    </style>
</head>
<body>

    <div id="debug-log">Conectando...</div>

    <div class="tft-screen">
        <div class="header">
            <span>COPA 2026</span>
            <button id="btn-teste-audio" title="Testar Áudio">
                <img src="assets/favicon.ico" alt="Testar Áudio">
            </button>
        </div>
        
        <div class="game-list" id="main-queue">
            <div style="color: var(--text-muted); text-align: center; margin-top: 50px; font-size: 13px;">Carregando...</div>
        </div>

        <div class="history-block">
            <div class="history-title">Último Resultado</div>
            <div id="history-content">
                <div style="color: var(--text-muted); text-align: center; font-size: 12px;">Aguardando dados...</div>
            </div>
        </div>
    </div>

    <script>
        const URL_PROXY = 'https://cuptracker.sstudioslabs.workers.dev/v4/matches?competitions=WC';

        let placaresAnteriores = {};
        let historicoGols = {}; 
        const TEMPO_DESTAQUE_MS = 180000; 

        const somGol = new Audio('assets/audio.mp3');

        document.getElementById('btn-teste-audio').addEventListener('click', () => {
            somGol.currentTime = 0; 
            somGol.play().catch(() => {});
        });
        
        function criarBlocoPartida(match, isLive = false, quemMarcou = null) {
            const siglaA = match.homeTeam.tla || "---";
            const siglaB = match.awayTeam.tla || "---";
            const logoA = match.homeTeam.crest || "";
            const logoB = match.awayTeam.crest || "";
            
            const golA = match.score.fullTime.home !== null ? match.score.fullTime.home : "-";
            const golB = match.score.fullTime.away !== null ? match.score.fullTime.away : "-";

            const corGolA = quemMarcou === 'home' ? '#00FF00' : '#FFF';
            const corGolB = quemMarcou === 'away' ? '#00FF00' : '#FFF';

            const dataJogo = new Date(match.utcDate);
            const dia = String(dataJogo.getDate()).padStart(2, '0');
            const mes = String(dataJogo.getMonth() + 1).padStart(2, '0');
            const horaMinuto = dataJogo.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

            let infoCentral = "";
            
            if (match.status === "IN_PLAY") {
                infoCentral = '<span class="live-dot"></span>Ao Vivo';
            } else if (match.status === "PAUSED") {
                infoCentral = "Intervalo";
            } else if (match.status === "FINISHED") {
                infoCentral = `${dia}/${mes} - Fim`; 
            } else {
                infoCentral = `${dia}/${mes} ${horaMinuto}`;
            }

            return `
                <div class="match-block ${isLive ? 'live' : ''} ${quemMarcou ? 'gol-ativo' : ''}">
                    <div class="team-side">
                        <img src="${logoA}" class="team-logo" alt="${siglaA}">
                        <span class="tla">${siglaA}</span>
                    </div>
                    <div class="center-info">
                        <div class="score-row">
                            <span class="score-num ${quemMarcou === 'home' ? 'gol-marcado' : ''}" style="color: ${corGolA};">${golA}</span>
                            <span class="score-sep">x</span>
                            <span class="score-num ${quemMarcou === 'away' ? 'gol-marcado' : ''}" style="color: ${corGolB};">${golB}</span>
                        </div>
                        <span class="status-time">${infoCentral}</span>
                    </div>
                    <div class="team-side right">
                        <span class="tla">${siglaB}</span>
                        <img src="${logoB}" class="team-logo" alt="${siglaB}">
                    </div>
                </div>
            `;
        }

        async function atualizarPainel() {
            const debugLog = document.getElementById('debug-log');
            const mainQueue = document.getElementById('main-queue');
            const historyContent = document.getElementById('history-content');
            
            const formatarData = (d) => {
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            };

            const hoje = new Date();
            
            const dataInicio = new Date(hoje);
            dataInicio.setDate(hoje.getDate() - 1);
            
            const dataFim = new Date(hoje);
            dataFim.setDate(hoje.getDate() + 3);
            
            const urlFinal = `${URL_PROXY}&dateFrom=${formatarData(dataInicio)}&dateTo=${formatarData(dataFim)}&nocache=${hoje.getTime()}`;

            try {
                const response = await fetch(urlFinal, { cache: 'no-store' });
                if (!response.ok) throw new Error();
                const data = await response.json();
                
                debugLog.innerText = "Online";

                const aoVivo = [], proximos = [], encerrados = [];
                
                data.matches.forEach(m => {
                    if (m.status === "IN_PLAY" || m.status === "PAUSED") { 
                        aoVivo.push(m);
                        const golsCasa = m.score.fullTime.home !== null ? m.score.fullTime.home : 0;
                        const golsFora = m.score.fullTime.away !== null ? m.score.fullTime.away : 0;

                        if (placaresAnteriores[m.id]) {
                            if (golsCasa > placaresAnteriores[m.id].home) {
                                historicoGols[m.id] = { time: 'home', timestamp: hoje.getTime() };
                                somGol.play().catch(() => {});
                            } else if (golsFora > placaresAnteriores[m.id].away) {
                                historicoGols[m.id] = { time: 'away', timestamp: hoje.getTime() };
                                somGol.play().catch(() => {});
                            }
                        }
        
                        placaresAnteriores[m.id] = { home: golsCasa, away: golsFora };
                    }
                    else if (m.status === "FINISHED") encerrados.push(m);
                    else proximos.push(m);
                });

                proximos.sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));
                encerrados.sort((a, b) => new Date(b.utcDate) - new Date(a.utcDate));

                const proximosLimitados = proximos.slice(0, 5);

                mainQueue.innerHTML = "";
                [...aoVivo, ...proximosLimitados].forEach(m => {
                    let destaqueAtivo = null;
                    if (historicoGols[m.id] && (hoje.getTime() - historicoGols[m.id].timestamp < TEMPO_DESTAQUE_MS)) {
                        destaqueAtivo = historicoGols[m.id].time;
                    }
                    mainQueue.innerHTML += criarBlocoPartida(m, m.status === "IN_PLAY", destaqueAtivo);
                });
                
                historyContent.innerHTML = encerrados.length > 0 ? criarBlocoPartida(encerrados[0]) : "Sem resultados";

            } catch (e) {
                debugLog.innerText = "Erro de conexão";
            }
        }

        atualizarPainel();
        setInterval(atualizarPainel, 30000); 
    </script>
</body>
</html>
